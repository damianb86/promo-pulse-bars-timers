query CartInput {
  discount {
    discountClasses
    metafield(namespace: "$app:promo-pulse", key: "advanced-discount-config") {
      jsonValue
      value
    }
  }
  cart {
    cost {
      subtotalAmount {
        amount
      }
    }
    lines {
      id
      quantity
      cost {
        subtotalAmount {
          amount
        }
      }
      merchandise {
        __typename
        ... on ProductVariant {
          id
          product {
            id
          }
        }
      }
    }
  }
}
