# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "3d18b230d925009893696ea39efcb15a"
application_url = "https://app-promo-pulse.zuam.dev"
embedded = true
name = "Promo Pulse: Bars & Timers"

[webhooks]
api_version = "2026-04"

[[webhooks.subscriptions]]
topics = [ "orders/create" ]
uri = "/webhooks/orders/create"

[[webhooks.subscriptions]]
topics = [ "app/uninstalled" ]
uri = "/webhooks/app/uninstalled"

[[webhooks.subscriptions]]
topics = [ "app/scopes_update" ]
uri = "/webhooks/app/scopes_update"

[[webhooks.subscriptions]]
compliance_topics = [ "customers/data_request", "customers/redact", "shop/redact" ]
uri = "/webhooks/compliance"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_products,read_orders,read_discounts,write_discounts,write_pixels,read_customer_events,read_markets,write_markets,read_files"
# read_themes is optional: only requested when the merchant runs the onboarding
# "Run setup checks" button (theme app-block detection).
optional_scopes = [ "read_themes" ]

[access.admin]
embedded_app_direct_api_access = true
direct_api_mode = "online"

[auth]
redirect_urls = [ "https://app-promo-pulse.zuam.dev/auth/callback" ]

[app_proxy]
url = "https://app-promo-pulse.zuam.dev/apps/promo-pulse"
subpath = "promo-pulse"
prefix = "apps"

[build]
automatically_update_urls_on_dev = true
